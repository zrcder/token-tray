name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build -ldflags="-s -w" -o TokenTray .

      - name: Assemble .app bundle
        run: |
          APP="dist/TokenTray.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp TokenTray "$APP/Contents/MacOS/TokenTray"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>TokenTray</string>
              <key>CFBundleDisplayName</key><string>TokenTray</string>
              <key>CFBundleIdentifier</key><string>com.zrcder.tokentray</string>
              <key>CFBundleVersion</key><string>0.1.0</string>
              <key>CFBundleShortVersionString</key><string>0.1.0</string>
              <key>CFBundleExecutable</key><string>TokenTray</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>LSUIElement</key><true/>
              <key>LSMinimumSystemVersion</key><string>13.0</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key><true/>
              </dict>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$APP" || true

      - name: Create .dmg
        run: |
          hdiutil create -volname TokenTray -fs HFS+ \
            -srcfolder dist/TokenTray.app -ov -format UDZO dist/TokenTray.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTray-dmg
          path: dist/TokenTray.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TokenTray.dmg
          generate_release_notes: true
