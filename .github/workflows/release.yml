name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w" -o TokenTray .

      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        run: |
          APP="dist/TokenTray.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp TokenTray "$APP/Contents/MacOS/TokenTray"
          [ -f icon.icns ] && cp icon.icns "$APP/Contents/Resources/icon.icns"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>TokenTray</string>
            <key>CFBundleDisplayName</key><string>TokenTray</string>
            <key>CFBundleIdentifier</key><string>com.zrcder.tokentray</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>CFBundleExecutable</key><string>TokenTray</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSUIElement</key><true/>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          </dict></plist>
          EOF
          codesign --force --deep --sign - "$APP" || true
          mkdir -p release
          hdiutil create -volname TokenTray -fs HFS+ \
            -srcfolder "$APP" -ov -format UDZO release/TokenTray.dmg

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir -p release
          copy TokenTray.exe release\TokenTray.exe

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp TokenTray release/TokenTray-linux-amd64
          chmod +x release/TokenTray-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTray-${{ matrix.name }}
          path: release/*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
